<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جامعة الصفوة – تتبع العين</title>

  <!-- WebGazer from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.min.js"></script>

  <style>
    /* ── Variables ── */
    :root {
      --bg:        #0b0f1a;
      --surface:   #111827;
      --border:    #1e2d45;
      --gold:      #f5c842;
      --gold-glow: #f5c84266;
      --text:      #c9d6e8;
      --text-dim:  #4a5a72;
      --read:      #6eb5ff;
      --btn-bg:    #162235;
      --btn-hover: #1d3050;
      --radius:    14px;
      --transition: 0.35s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 24px 80px;
      overflow-x: hidden;
    }

    /* ── Background decoration ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, #0d2240 0%, transparent 70%),
        radial-gradient(ellipse 50% 30% at 80% 90%, #0a1f38 0%, transparent 60%),
        var(--bg);
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown .8s ease both;
    }
    .header h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: .5px;
      background: linear-gradient(135deg, #f5c842 30%, #e8f4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .header p {
      font-size: .9rem;
      color: var(--text-dim);
    }

    /* ── Status bar ── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 10px 22px;
      margin-bottom: 40px;
      font-size: .82rem;
      animation: fadeDown .9s .15s ease both;
      opacity: 0;
    }
    #status-bar.visible { opacity: 1; }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #ff5e5e;
      flex-shrink: 0;
      transition: background .4s;
    }
    .dot.active { background: #4cef80; box-shadow: 0 0 6px #4cef80; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 40px;
      max-width: 780px;
      width: 100%;
      margin-bottom: 36px;
      animation: fadeUp .8s .3s ease both;
      opacity: 0;
      box-shadow: 0 4px 40px #00000044;
    }
    .card.visible { opacity: 1; }
    .card-label {
      font-size: .72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    /* ── Text with eye-tracked words ── */
    #tracked-text {
      font-size: clamp(1.15rem, 2.8vw, 1.5rem);
      line-height: 2.4;
      word-spacing: 6px;
    }
    .word {
      display: inline-block;
      cursor: default;
      color: var(--text);
      transition:
        color var(--transition),
        transform var(--transition),
        text-shadow var(--transition);
      transform-origin: center bottom;
      padding: 0 2px;
      border-radius: 4px;
    }
    .word.gazed {
      color: var(--gold);
      transform: scale(1.35);
      text-shadow: 0 0 18px var(--gold-glow), 0 0 4px var(--gold-glow);
    }
    .word.read {
      color: var(--read);
    }
    .word.read.gazed {
      color: var(--gold);  /* gold overrides read when gazing */
    }

    /* ── Buttons section ── */
    .buttons-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    .gaze-btn {
      position: relative;
      background: var(--btn-bg);
      color: #a8c4e0;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 36px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      overflow: hidden;
      transition: background var(--transition), border-color var(--transition), color var(--transition), transform .2s;
      min-width: 150px;
    }
    .gaze-btn:hover { background: var(--btn-hover); }
    .gaze-btn:active { transform: scale(.96); }

    /* Progress ring indicator inside button */
    .gaze-btn .btn-label { position: relative; z-index: 1; pointer-events: none; }

    .gaze-btn .progress-ring {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: conic-gradient(var(--gold) 0deg, transparent 0deg);
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
    }
    .gaze-btn.gazing .progress-ring { opacity: 1; }
    .gaze-btn.gazing {
      border-color: var(--gold);
      color: var(--gold);
    }
    .gaze-btn.activated {
      background: #2a1f00;
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 20px var(--gold-glow);
      animation: btnFlash .5s ease;
    }
    @keyframes btnFlash {
      0%   { box-shadow: 0 0 0 var(--gold-glow); }
      50%  { box-shadow: 0 0 40px var(--gold-glow); }
      100% { box-shadow: 0 0 20px var(--gold-glow); }
    }

    /* ── Gaze cursor ── */
    #gaze-cursor {
      position: fixed;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle, #f5c842cc, #f5c84200);
      border: 2px solid var(--gold);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: left .08s linear, top .08s linear;
      display: none;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #162235;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 12px 28px;
      border-radius: 40px;
      font-size: .85rem;
      opacity: 0;
      transition: opacity .4s, transform .4s;
      z-index: 1000;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .card { padding: 24px 20px; }
      #tracked-text { font-size: 1.05rem; line-height: 2.2; }
      .gaze-btn { padding: 15px 26px; font-size: .92rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>جامعة الصفوة</h1>
    <p>تجربة تتبع العين · Eye Tracking Demo</p>
  </div>

  <div id="status-bar">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">جارٍ تهيئة الكاميرا…</span>
  </div>

  <!-- Text card -->
  <div class="card" id="text-card">
    <div class="card-label">✦ انظر إلى الكلمات</div>
    <div id="tracked-text"></div>
  </div>

  <!-- Buttons card -->
  <div class="card" id="btn-card">
    <div class="card-label">✦ انظر إلى الزر لمدة ثانية لتفعيله</div>
    <div class="buttons-grid" id="buttons-grid"></div>
  </div>

  <!-- Floating gaze cursor -->
  <div id="gaze-cursor"></div>

  <!-- Toast notification -->
  <div id="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════
   CONFIG
═══════════════════════════════════════ */
const SENTENCE = "أهلا و سهلا في جامعة الصفوة التي تضم الأقسام كاملة الطبية و غيرها";
const BTN_LABELS = ["متابعة ١", "متابعة ٢", "متابعة ٣", "متابعة ٤"];
const GAZE_DWELL_MS = 1000;   // ms to activate a button
const SMOOTH_K = 0.20;        // lower = smoother gaze cursor

/* ═══════════════════════════════════════
   BUILD UI
═══════════════════════════════════════ */
// Words
const textContainer = document.getElementById('tracked-text');
const words = SENTENCE.split(' ');
const wordEls = [];

words.forEach((w, i) => {
  const sp = document.createElement('span');
  sp.className = 'word';
  sp.textContent = w;
  sp.dataset.index = i;
  textContainer.appendChild(sp);
  if (i < words.length - 1) textContainer.appendChild(document.createTextNode(' '));
  wordEls.push(sp);
});

// Buttons
const btnsGrid = document.getElementById('buttons-grid');
const btnEls = BTN_LABELS.map(label => {
  const btn = document.createElement('button');
  btn.className = 'gaze-btn';
  btn.innerHTML = `<div class="progress-ring" id="ring-${label}"></div><span class="btn-label">${label}</span>`;
  btn.addEventListener('click', () => onBtnActivate(btn, label));
  btnsGrid.appendChild(btn);
  return btn;
});

/* ═══════════════════════════════════════
   GAZE CURSOR
═══════════════════════════════════════ */
const cursor = document.getElementById('gaze-cursor');
let smoothX = 0, smoothY = 0;

function updateCursor(x, y) {
  smoothX += (x - smoothX) * SMOOTH_K;
  smoothY += (y - smoothY) * SMOOTH_K;
  cursor.style.left = smoothX + 'px';
  cursor.style.top  = smoothY + 'px';
}

/* ═══════════════════════════════════════
   HIT TEST
═══════════════════════════════════════ */
function getElementAtGaze(x, y) {
  // Check words
  for (const el of wordEls) {
    const r = el.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return { type: 'word', el };
  }
  // Check buttons
  for (const el of btnEls) {
    const r = el.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return { type: 'btn', el };
  }
  return null;
}

/* ═══════════════════════════════════════
   WORD STATE
═══════════════════════════════════════ */
let currentWord = null;

function setGazedWord(el) {
  if (currentWord === el) return;
  if (currentWord) currentWord.classList.remove('gazed');
  currentWord = el;
  if (el) {
    el.classList.add('gazed');
    el.classList.add('read');   // mark as read permanently
  }
}

/* ═══════════════════════════════════════
   BUTTON DWELL
═══════════════════════════════════════ */
let gazeBtn = null;
let gazeStart = null;
let dwellRAF = null;

function startDwell(btn) {
  if (gazeBtn === btn) return;
  cancelDwell();
  gazeBtn = btn;
  gazeStart = performance.now();
  btn.classList.add('gazing');
  animateDwell();
}

function animateDwell() {
  if (!gazeBtn) return;
  const elapsed = performance.now() - gazeStart;
  const pct = Math.min(elapsed / GAZE_DWELL_MS, 1);
  const deg = pct * 360;
  const ring = gazeBtn.querySelector('.progress-ring');
  if (ring) ring.style.background = `conic-gradient(var(--gold) ${deg}deg, transparent ${deg}deg)`;

  if (pct >= 1) {
    gazeBtn.click();
    cancelDwell();
    return;
  }
  dwellRAF = requestAnimationFrame(animateDwell);
}

function cancelDwell() {
  if (dwellRAF) { cancelAnimationFrame(dwellRAF); dwellRAF = null; }
  if (gazeBtn) {
    gazeBtn.classList.remove('gazing');
    const ring = gazeBtn.querySelector('.progress-ring');
    if (ring) ring.style.background = '';
    gazeBtn = null;
  }
  gazeStart = null;
}

function onBtnActivate(btn, label) {
  btn.classList.add('activated');
  showToast(`✅ تم تفعيل زر: ${label}`);
  setTimeout(() => btn.classList.remove('activated'), 2000);
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ═══════════════════════════════════════
   WEBGAZER INIT
═══════════════════════════════════════ */
const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

function setStatus(active, msg) {
  statusDot.className = 'dot' + (active ? ' active' : '');
  statusText.textContent = msg;
  document.getElementById('status-bar').classList.add('visible');
  document.getElementById('text-card').classList.add('visible');
  document.getElementById('btn-card').classList.add('visible');
}

// Hide WebGazer's own video overlay & face overlay
function hideWebgazerUI() {
  const ids = ['webgazerVideoContainer','webgazerFaceOverlay','webgazerFaceFeedbackBox','webgazerGazeDot'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  // Also hide via style tag
  const s = document.createElement('style');
  s.textContent = '#webgazerVideoContainer,#webgazerFaceOverlay,#webgazerFaceFeedbackBox,#webgazerGazeDot{display:none!important}';
  document.head.appendChild(s);
}

window.addEventListener('load', () => {
  setStatus(false, 'جارٍ تهيئة الكاميرا…');

  webgazer
    .setGazeListener((data) => {
      if (!data) return;
      const x = data.x, y = data.y;

      // Update custom cursor
      cursor.style.display = 'block';
      updateCursor(x, y);

      // Hit test
      const hit = getElementAtGaze(x, y);

      if (hit && hit.type === 'word') {
        setGazedWord(hit.el);
        cancelDwell();
      } else if (hit && hit.type === 'btn') {
        setGazedWord(null);
        startDwell(hit.el);
      } else {
        setGazedWord(null);
        cancelDwell();
      }
    })
    .showPredictionPoints(false)
    .showVideoPreview(false)
    .begin()
    .then(() => {
      hideWebgazerUI();
      setStatus(true, 'تتبع العين نشط ✦ انظر إلى الكلمات أو الأزرار');
    })
    .catch(err => {
      console.error(err);
      setStatus(false, '⚠️ تعذّر الوصول إلى الكاميرا. يرجى السماح بها وإعادة التحميل.');
    });
});

// Clean up on unload
window.addEventListener('beforeunload', () => {
  try { webgazer.end(); } catch(e) {}
});
</script>
</body>
</html>
